services:
  db:
    build:
      context: ./db
      dockerfile: Dockerfile
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    depends_on:
      - db
    build:
      context: ./wordpress
      dockerfile: Dockerfile
    restart: always
    ports:
      - "${WP_PORT}:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
      WORDPRESS_DB_NAME: ${DB_NAME}
    volumes:
      - wordpress_data:/var/www/html

  wp-cli:
    depends_on:
      - db
      - wordpress
    image: wordpress:cli-php8.2
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
      WORDPRESS_DB_NAME: ${DB_NAME}
    volumes:
      - wordpress_data:/var/www/html
    # Keep the container running so we can exec into it
    command: tail -f /dev/null

  manager:
    build:
      context: ./manager
      dockerfile: Dockerfile
    container_name: wp_manager
    ports:
      - "8080:80"
    cap_add:
      - SYS_TIME
    volumes:
      # Mount the manager code
      - ./manager:/var/www/html
      # Mount the wordpress volume to manipulate files
      - wordpress_data:/mnt/wordpress
      # Mount docker socket to restart containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount the entire project so docker-compose can re-read .env
      - .:/project
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
      WORDPRESS_DB_NAME: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      WP_PORT: ${WP_PORT}
    depends_on:
      - db

volumes:
  db_data:
  wordpress_data:
