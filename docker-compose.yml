name: docker-wp

services:
  db:
    container_name: docker-wp-db
    build:
      context: ./db
      dockerfile: Dockerfile
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./db_data:/var/lib/mysql

  wordpress:
    container_name: docker-wp-wordpress
    depends_on:
      - db
    build:
      context: ./wordpress
      dockerfile: Dockerfile
    restart: always
    ports:
      - "${WP_PORT}:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
      WORDPRESS_DB_NAME: ${DB_NAME}
      WORDPRESS_DEBUG: "true"
    volumes:
      - ./wordpress_data:/var/www/html

  wp-cli:
    container_name: docker-wp-cli
    depends_on:
      - db
      - wordpress
    image: wordpress:cli-php8.2
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
      WORDPRESS_DB_NAME: ${DB_NAME}
      WORDPRESS_DEBUG: "true"
      WP_SITE_URL: http://localhost:${WP_PORT}
      WP_SITE_TITLE: ${WP_SITE_TITLE}
      WP_ADMIN_USER: ${WP_ADMIN_USER}
      WP_ADMIN_PASSWORD: ${WP_ADMIN_PASSWORD}
      WP_ADMIN_EMAIL: ${WP_ADMIN_EMAIL}
      WP_PLUGINS: ${WP_PLUGINS}
      WP_INACTIVE_PLUGINS: ${WP_INACTIVE_PLUGINS}
      WC_STORE_COUNTRY: ${WC_STORE_COUNTRY}
      WC_STORE_CURRENCY: ${WC_STORE_CURRENCY}
      WC_SKIP_ONBOARDING: ${WC_SKIP_ONBOARDING}
    volumes:
      - ./wordpress_data:/var/www/html
      - ./scripts/wp-setup-common.sh:/usr/local/bin/wp-setup-common.sh:ro
      - ./wp-cli/bootstrap-wordpress.sh:/usr/local/bin/bootstrap-wordpress.sh:ro
    command: sh /usr/local/bin/bootstrap-wordpress.sh

  manager:
    build:
      context: ./manager
      dockerfile: Dockerfile
    container_name: docker-wp-manager
    ports:
      - "8080:80"
    cap_add:
      - SYS_TIME
    volumes:
      # Mount the manager code
      - ./manager:/var/www/html
      # Mount the wordpress volume to manipulate files
      - ./wordpress_data:/mnt/wordpress
      # Mount docker socket to restart containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount the entire project so docker-compose can re-read .env
      - .:/project
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
      WORDPRESS_DB_NAME: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      WP_PORT: ${WP_PORT}
      WORDPRESS_DEBUG: "true"
      WP_SITE_TITLE: ${WP_SITE_TITLE}
      WP_ADMIN_USER: ${WP_ADMIN_USER}
      WP_ADMIN_PASSWORD: ${WP_ADMIN_PASSWORD}
      WP_ADMIN_EMAIL: ${WP_ADMIN_EMAIL}
      WP_PLUGINS: ${WP_PLUGINS}
      WP_INACTIVE_PLUGINS: ${WP_INACTIVE_PLUGINS}
      WC_STORE_COUNTRY: ${WC_STORE_COUNTRY}
      WC_STORE_CURRENCY: ${WC_STORE_CURRENCY}
      WC_SKIP_ONBOARDING: ${WC_SKIP_ONBOARDING}
      WORDPRESS_CONTAINER_NAME: docker-wp-wordpress
    depends_on:
      - db